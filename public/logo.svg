<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096dd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40a9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1890ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faad14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d48806;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" />

  <!-- 内部白色底 -->
  <circle cx="60" cy="60" r="48" fill="rgba(255,255,255,0.12)" />

  <!-- 水滴 -->
  <path d="M42 72 C42 72 30 55 30 45 C30 38.4 35.4 33 42 33 C48.6 33 54 38.4 54 45 C54 55 42 72 42 72 Z"
        fill="url(#water)" opacity="0.95"/>
  <ellipse cx="38" cy="43" rx="3" ry="4" fill="rgba(255,255,255,0.35)" />

  <!-- 闪电 -->
  <path d="M66 28 L56 52 L66 52 L58 78 L82 46 L70 46 L78 28 Z"
        fill="url(#bolt)" opacity="0.95"/>
  <path d="M64 34 L59 50 L67 50 L62 70 L78 44 L69 44 L74 34 Z"
        fill="rgba(255,255,255,0.2)" />

  <!-- 扳手（小装饰） -->
  <g transform="translate(70,62) rotate(35)" opacity="0.85">
    <rect x="-2" y="0" width="4" height="18" rx="2" fill="#fff"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#fff" stroke-width="3"/>
    <circle cx="0" cy="0" r="3" fill="url(#bg)"/>
  </g>

  <!-- 底部文字背景 -->
  <rect x="15" y="82" width="90" height="24" rx="12" fill="rgba(0,0,0,0.25)" />

  <!-- 底部文字 -->
  <text x="60" y="98" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="13" font-weight="600" fill="#fff">水电维修</text>
</svg>
